  /parcels/pe:
    post:
      tags:
        - Pre-Alert Peru
      operationId: submitParcelDeclarePeru
      summary: Submit Parcel Declaration (Peru)
      x-public: true
      x-audience: pre-alert
      x-category: Pre-Alert Peru
      description: |
        Submits a **parcel** (HAWB) declaration for Peru. **Call this first** before submitting the manifest.

        This endpoint creates HAWB records and registers parcel-level details. After all parcels for a shipment are declared, use `POST /mawbs/pe` to submit the manifest.

        **Country code validation**: The `destinationCountryCode` field must be set to `PE` for this endpoint. The API will validate and reject requests with any other country code.

        **Peru-specific requirements:**
        - Consignee `department` (Departamento) is required
        - `province` (Provincia) and `district` (Distrito) for precise addressing
        - `identificationType` should be `DNI` for Peruvian nationals
        - `trackingId` must be unique across all parcel declarations
      parameters:
        - $ref: '#/components/parameters/XClientCodeHeader'
        - $ref: '#/components/parameters/XClientSecretHeader'
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XSpanIdHeader'
