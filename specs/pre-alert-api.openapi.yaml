components:
  schemas:
    ManifestDeclareRequest:
      type: object
      required:
        - mawbNumber
        - destinationCountryCode
        - customsType
        - transportType
        - fromPortCode
        - toPortCode
        - totalPackages
        - totalWeight
        - totalValue
        - currency
        - shipperInfo
        - itemList
      properties:
        mawbNumber:
          type: string
          description: Master Air Waybill Number
          maxLength: 50
          example: '2024001'
        manifestNumber:
          type: string
          description: Unique manifest number
          maxLength: 50
          pattern: ^[A-Z0-9_-]+$
          example: MANIFEST-2024-001
        destinationCountryCode:
          type: string
          description: ISO 2-letter destination country code
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
          example: PE
        customsType:
          type: string
          description: Type of customs declaration
          enum:
            - INWARD
            - OUTWARD
          example: INWARD
        customsClearanceMode:
          type: string
          description: |
            Customs clearance mode for this manifest:
            - `STANDARD`: Regular postal/commercial clearance
            - `EXPRESS`: Expedited/courier clearance
            - `OVERSEAS_CCC_DIRECT`: Direct cross-border e-commerce clearance
          enum:
            - STANDARD
            - EXPRESS
            - OVERSEAS_CCC_DIRECT
          example: STANDARD
        transportType:
          type: string
          description: Type of transport
          enum:
            - AIR
            - SEA
            - ROAD
            - RAIL
          example: AIR
        transportNumber:
          type: string
          description: Transport number (flight, vessel, etc.)
          maxLength: 20
          example: 5Y8052
        fromPortCode:
          type: string
          description: Origin port/airport code. Use 3-letter IATA code for AIR transport
          maxLength: 8
          example: HKG
        toPortCode:
          type: string
          description: Destination port/airport code. Use 3-letter IATA code for AIR transport
          maxLength: 8
          example: LIM
        eta:
          type: string
          format: date-time
          description: Estimated time of arrival
          example: '2024-01-20T14:30:00Z'
        etd:
          type: string
          format: date-time
          description: Estimated time of departure
          example: '2024-01-18T08:15:00Z'
        totalPackages:
          type: integer
          description: Total number of parcels (HAWBs) expected in this manifest.
          minimum: 1
          example: 1060
        totalWeight:
          type: number
          description: Total weight of all packages in kilograms
          minimum: 0
          example: 458.0
        totalValue:
          type: number
          description: Total declared value
          minimum: 0
          example: 15000.0
        currency:
          type: string
          description: Currency code (ISO 4217)
          maxLength: 3
          pattern: ^[A-Z]{3}$
          example: USD
        clientReferenceNumber:
          type: string
          description: Client reference number
          maxLength: 100
        exportLicense:
          type: string
          description: Export license number
          maxLength: 100
        shipperInfo:
          $ref: '#/components/schemas/ShipperInfo'
        itemList:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ParcelInfo'
    ManifestDeclareResponse:
      type: object
      required:
        - success
        - message
        - mawbNumber
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request processed successfully
        manifestNumber:
          type: string
          example: MANIFEST-2024-001
        mawbNumber:
          type: string
          example: '2024001'
        totalParcels:
          type: integer
          minimum: 0
          example: 3
        processedParcels:
          type: integer
          minimum: 0
          example: 3
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    GenericErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDocument'
    ParcelDeclareRequest:
      type: object
      required:
        - destinationCountryCode
        - trackingId
        - grossWeight
        - declaredValue
        - pieces
        - currency
        - clientTrackingNumber
        - senderInfo
        - consigneeInfo
        - itemsList
      properties:
        destinationCountryCode:
          type: string
          description: ISO 2-letter destination country code
          minLength: 2
          maxLength: 2
          pattern: ^[A-Z]{2}$
          example: PE
        trackingId:
          type: string
          description: Unique tracking identifier. Usually the last-mile carrier tracking number used for local delivery to the end customer.
          maxLength: 100
          pattern: ^[A-Z0-9_-]+$
          example: SH-PE-123456789
        grossWeight:
          type: string
          description: Gross weight of the parcel. Must be in the unit specified by weightUom (default KG).
          pattern: ^[0-9]+\.?[0-9]*$
          example: '2.5'
        netWeight:
          type: string
          description: Net weight
          pattern: ^[0-9]+\.?[0-9]*$
          example: '2.0'
        weightUom:
          type: string
          description: Weight unit of measure (default KG)
          enum:
            - KG
            - LB
            - G
            - OZ
          default: KG
          example: KG
        declaredValue:
          type: number
          description: FOB value - the declared commercial value of goods at origin port excluding international shipping and insurance.
          minimum: 0.01
          example: 25
        fobValue:
          type: number
          description: FOB (Free On Board) value in declared currency
          minimum: 0
          example: 10.14
        cifValue:
          type: number
          description: CIF (Cost, Insurance, Freight) value in declared currency
          minimum: 0
          example: 12.50
        freightPrice:
          type: number
          description: Freight cost
          minimum: 0
          example: 0.5
        insurancePrice:
          type: number
          description: Insurance cost
          minimum: 0
          example: 0.0
        pieces:
          type: integer
          description: Number of physical boxes/packages that make up this specific HAWB.
          minimum: 1
          example: 1
        currency:
          type: string
          description: Currency code (ISO 4217)
