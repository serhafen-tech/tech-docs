openapi: 3.1.0
info:
  title: Temu Pre-Alert API
  version: 1.0.0
  description: |
    # Temu Pre-Alert API – Peru & Chile

    This API is used by **Temu** to submit pre-alert declarations for shipments to **Peru** and **Chile**. Unlike the generic pre-alert flow, Temu sends a **single combined payload** that includes both manifest (MAWB) and parcel (HAWB) details in one request.
    ## Authentication

    All API requests require authentication using a Basic Auth token obtained from our IAM service.

    ### Obtaining an Access Token

    Before using the Temu Pre-Alert API, you must obtain a Basic Auth token via the machine-to-machine (M2M) authentication endpoint.

    **Token Endpoint:**
    ```
    POST https://api.serhafen-staging.andinolabs.tech/iam-service/v0/auth/m2m/token
    ```
    **Request Example:**
    ```bash
    curl -X POST "https://api.serhafen-staging.andinolabs.tech/iam-service/v0/auth/m2m/token" \
      -H "Content-Type: application/json" \
      -d '{
        "clientId": "your-client-id",
        "clientSecret": "your-client-secret"
      }' | jq .
    ```

    **Response:**
    The endpoint returns a JSON object containing an access token, which you will use as the authorization token in subsequent API requests.

    ### Using the Access Token

    Once you have obtained the token, include it in all Temu Pre-Alert API requests:

    - **Authorization header** (required): Token obtained from the IAM service.

    Authentication failures will result in an HTTP `401 Unauthorized` response.

    ## Idempotency and Duplicate Prevention

    To ensure data integrity and prevent duplicate submissions:

    - **Unique hawbTrackingId**: Each parcel declaration must use a unique `hawbTrackingId`. This identifier serves as the idempotency key for parcel submissions.
    - **Unique mawbManifestNumber**: Each manifest must have a unique `mawbManifestNumber` to prevent duplicate manifest processing.
    - **Duplicate detection**: The API automatically detects and may reject duplicate declarations with the same tracking identifiers.

    Duplicate submissions may be rejected with an HTTP `400 Bad Request` response or silently ignored depending on the processing state.

    ## Call Flow (Temu-Specific)

    Temu uses **one call per country** — no separate parcel-then-manifest order:

    - **Peru:** `POST /temu/pe` — Send the full manifest + parcel payload for Peru.
    - **Chile:** `POST /temu/cl` — Send the full manifest + parcel payload for Chile.

    ## Processing Workflow

    When a declaration is submitted, the API executes the following stages:

    1. **Synchronous Validation**: The API authenticates the client credentials, validates the JSON structure against the OpenAPI schema, and verifies all mandatory header and payload fields are present and correctly formatted.
    2. **Secure Storage**: The complete payload is persisted securely to our data vault. At this stage, the API returns an HTTP `200 OK` or `202 Accepted` response to acknowledge receipt and close the connection promptly.
    3. **Asynchronous Processing**: The backend system independently processes the stored manifest, unpacks individual parcels, and routes them for last-mile integration and customs clearance without blocking the client connection.

    ## Environments and base URLs

    | Environment   | Base URL                                    | Use case                    |
    |---------------|---------------------------------------------|-----------------------------|
    | **Production**| `https://api.serhafen-net.andinolabs.tech/pre-alert` | Live Temu declarations      |
    | **Staging**   | `https://api.serhafen-staging.andinolabs.tech/pre-alert`       | Testing and integration     |
    | **Local**     | `/pre-alert` (relative to your host)          | Development only            |
  contact:
    name: Platform Support
    email: platform-support@serhafen.com
