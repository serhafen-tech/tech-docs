paths:
  /temu/cl:
    post:
      tags:
        - Temu
      operationId: insertTemuPreAlertChile
      summary: Temu Chile Declaration (Manifest + Parcels)
      x-public: true
      x-audience: temu
      x-category: Temu
      description: |
        Receives a **single combined** manifest + parcels declaration from Temu for **Chile**. Send the full payload in one request; no separate parcel-then-manifest calls are required. The manifest header and parcel details are validated and stored; parcels are processed asynchronously from the stored manifest file.
        
        **Country code validation**: The `hawbAddresseeCountry` field must be set to `CL` for Chile-bound shipments. The API will validate and reject requests with inconsistent country data.
        
        **Chile-specific requirements:**
        - Consignee `hawbAddresseeCommune` (comuna) is required
        - `hawbAddresseeRut` should be valid Chilean RUT format (e.g., 12.345.678-9)
        - SII tax fields (`taxCompanyId`, `taxCompanyName`) for customs compliance
        - FOB/CIF valuation breakdown supported at parcel and item level
        - `hawbTrackingId` must be unique across all parcel declarations
      parameters:
        - $ref: '#/components/parameters/XTraceIdHeader'
        - $ref: '#/components/parameters/XSpanIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemuManifestRequest'
            examples:
              payload:
                summary: Temu Chile payload example
                value:
                  header:
                    - mawbMasterPlaceTransmission: HKG
                      mawbManifestNumber: 370-97842394
                      mawbFlightTakeoffDate: "2026/03/08"
                      mawbFlightArrivalDate: "2026/03/09"
                      mawbHawbCount: 2684
                      mawbDeclaredWeight: "1500.00"
                  detail:
                    - taxCompanyId: 59251750-7
                      taxCompanyName: Elementary Innovation Pte. Ltd.
                      taxHasBeenPaid: IVA_NO
                      itemList:
                        - country: CL
                          totalPrice: "2.58"
                          gnum: 1
