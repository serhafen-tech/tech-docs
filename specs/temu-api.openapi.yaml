        - updatedAt
    WaybillRequestBody:
      type: object
      properties:
        shipmentId:
          type: string
          description: Unique identifier for the shipment
          examples:
            - SHIP123456789
        senderDetails:
          $ref: '#/components/schemas/SenderDetails'
        receiverDetails:
          $ref: '#/components/schemas/ReceiverDetails'
        orderDetails:
          $ref: '#/components/schemas/OrderDetails'
        parcelDetails:
          $ref: '#/components/schemas/ParcelDetails'
      required:
        - shipmentId
        - senderDetails
        - receiverDetails
        - orderDetails
        - parcelDetails
    TemuHeader:
      type: object
      required:
        - mawbMasterPlaceTransmission
        - mawbManifestNumber
        - mawbFlightTakeoffDate
        - mawbFlightArrivalDate
        - mawbHawbCount
      properties:
        mawbMasterDate:
          type: string
          format: date-time
          description: Master air waybill creation date and time.
        mawbMasterPlaceTransmission:
          type: string
          description: The place of transmission for the mawb.
        mawbDateInternment:
          type: string
          format: date-time
          description: Date and time when the shipment entered customs or the destination country.
        mawbManifestNumber:
          type: string
          description: The unique identifier for mawb.
        mawbManifestType:
          type: string
          description: Type of manifest (e.g., commercial, courier, postal).
        mawbViaTransport:
          type: string
          description: Mode or route of transport (e.g., air freight, sea freight).
        mawbFlightTakeoffDate:
          type: string
          pattern: ^\d{4}\/\d{2}\/\d{2}$
          description: "Scheduled or actual departure time of the flight (ETD) (format: YYYY/MM/DD). Must be on or after MAWB creation."
        mawbFlightArrivalDate:
          type: string
          pattern: ^\d{4}\/\d{2}\/\d{2}$
          description: "Scheduled Estimated Time of Arrival (ETA) at the destination port (format: YYYY/MM/DD). Must be on or after MAWB creation."
        mawbHawbCount:
          type: number
          minimum: 0
          description: The total number of parcels included in this manifest.
        mawbDeclaredWeight:
          type: number
          description: Total consolidated weight of the MAWB in Kilograms (KG). Decimals are accepted.
          minimum: 0
        mawbVerifiedWeight:
          type: number
          description: The verified/actual weight of the consolidated shipment in Kilograms (KG) as confirmed by the carrier or customs authority.
          minimum: 0
    TemuDetail:
      type: object
      required:
        - hawbTrackingId
        - hawbShipperName
        - hawbShipperCity
        - hawbShipperCountry
        - hawbPieces
        - hawbAddresseeName
        - hawbAddresseeAddress
        - hawbAddresseeRegion
        - hawbAddresseeCommune
        - hawbAddresseeCountry
        - hawbAddresseePhone
        - hawbAddresseeRut
        - hawbDescriptionContent
        - hawbGrossWeight
        - hawbIdExternal
        - hawbBagId
        - hawbMasterCode
        - itemList
      properties:
        hawbTrackingId:
          type: string
          description: The last-mile carrier tracking number that will be used to deliver the parcel to the end customer.
        hawbShipperName:
          type: string
          description: Name of the shipper/sender of the parcel.
        hawbShipperCity:
          type: string
          description: City where the shipment originates.
        hawbShipperCountry:
          type: string
          description: Country of origin (ISO 2-letter country code).
        hawbPieces:
          type: integer
          description: Number of pieces/packages in this individual parcel shipment.
        hawbBarcode:
          type: string
          description: Barcode identifier for the parcel, used for scanning and tracking in warehouses.
        hawbAddresseeName:
          type: string
          description: Full name of the recipient/consignee.
        hawbAddresseeAddress:
          type: string
          description: Address for delivery.
        hawbAddresseeZipCode:
          type: string
          description: Postal/ZIP code of the delivery address.
        hawbAddresseeRegion:
          type: string
          description: Region or state of the delivery address.
        hawbAddresseeCity:
          type: string
          description: City of the delivery address.
        hawbAddresseeCommune:
          type: string
          description: Comuna
        hawbAddresseeDistrict:
          type: string
          description: Distrito/District
        hawbAddresseeProvince:
          type: string
          description: Provincia/Province
        hawbAddresseeDepartment:
          type: string
          description: Departamento/Department
        hawbAddresseeCountry:
          type: string
          description: 2-letter ISO 3166-1 alpha-2 country code. Must match the endpoint being called (e.g., CL for Chile, PE for Peru).
        hawbAddresseePhone:
          type: string
          description: Contact phone number of the recipient.
        hawbAddresseeEmail:
          type: string
          description: Email address of the recipient.
          format: email
        hawbAddresseeRut:
          type: string
          description: National Identification Number. For Chile, this must be a valid RUT (e.g., 12345678-9). For Peru, this should be a valid DNI (8 digits) or RUC (11 digits).
        hawbDescriptionContent:
          type: string
          description: Detailed, English or local language description of the goods for customs clearance. Vague descriptions like 'gift' or 'accessories' may cause customs delays.
        hawbWarning:
          type: string
          description: Special warnings or handling instructions for the parcel (e.g., fragile, perishable, hazardous materials).
        hawbValueUsd:
          description: Total declared commercial value of the individual parcel in USD. Usually equals the sum of all item totalPrices. (accepts number or string)
          oneOf:
            - type: number
            - type: string
        hawbFobValueUsd:
          description: Free On Board (FOB) value in USD. The cost of the goods excluding international shipping and insurance. (accepts number or string)
          oneOf:
            - type: number
            - type: string
        hawbCifValueUsd:
          description: Cost, Insurance, and Freight (CIF) value in USD. The total cost of the goods including shipping and insurance to the destination port. (accepts number or string)
          oneOf:
            - type: number
            - type: string
        taxCompanyId:
          type: string
          description: SII ID (registered ID)
        taxCompanyName:
          type: string
          description: Name of the company (as per SII)
        taxHasBeenPaid:
          type: string
          description: Indicates if VAT/Taxes have been prepaid. Accepted values typically include IVA_YES (Yes) or IVA_NO (No).
        hawbGrossWeight:
          description: Must be provided in Kilograms (KG). Decimals are accepted. (accepts number or string)
          oneOf:
            - type: number
            - type: string
        hawbWeightDimensional:
          type: number
          description: Volumetric/Dimensional weight of the parcel, typically in Kilograms (KG). Used for freight calculations when volume exceeds actual weight.
          minimum: 0
        hawbFreightValue:
          type: number
          minimum: 0
          description: The declared value of the parcel for customs purposes. This is the value that customs authorities will use to calculate duties and taxes.
        hawbIdExternal:
          type: string
          description: The Temu Order ID or external system identifier. Used for cross-referencing between systems.
        hawbBagId:
          type: string
          description: Identifier of the physical Big Bag or sack containing this parcel. Used for tracking within the warehouse/logistics network.
        hawbBatchNumber:
          type: string
          description: Batch number used for internal tracking and organization.
        hawbMasterCode:
          type: string
          description: Master code used for internal tracking and organization.
        hawbInsurance:
          type: number
          minimum: 0
        itemList:
          type: array
          items:
            $ref: '#/components/schemas/TemuItem'
        token:
          type: string
          description: Token for billing/partner association
    ErrorObject:
      type: object
      required:
