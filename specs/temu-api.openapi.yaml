            - 3
        totalWeight:
          type: number
          description: Total weight of all parcels in kilograms
          minimum: 0
          examples:
            - 15.5
            - 22.3
        totalVolume:
          type: number
          description: Total volume of all parcels in cubic meters
          minimum: 0
          examples:
            - 0.5
            - 1.2
        parcels:
          type: array
          description: List of individual parcels in the shipment
          items:
            $ref: '#/components/schemas/Parcel'
      required:
        - quantity
        - totalWeight
        - totalVolume
        - parcels
    TemuItem:
      type: object
      required:
        - country
        - gnum
        - hsCode
        - itemName
        - currency
        - qty
        - totalPrice
      properties:
        country:
          type: string
          description: Country of destination
          example: PE
        gnum:
          type: integer
          description: Line item index number (1, 2, 3...) referencing the position of this item within the parcel. Must start at 1 and increment sequentially.
          minimum: 1
        hsCode:
          type: string
          description: 6 to 10 digit Harmonized System Tariff Code. Required for accurate duty and tax calculation by local customs authorities.
        itemName:
          type: string
          description: Clear, English or local language description of the product. Avoid generic terms like 'gift' or 'merchandise' to prevent customs delays.
        currency:
          type: string
          description: 3-letter ISO 4217 Currency Code.
          pattern: ^[A-Z]{3}$
          example: USD
        price:
          type: number
          description: Unit price of a single item in the specified currency.
          minimum: 0
        qty:
          type: number
          description: Number of units of this specific item in the parcel.
          minimum: 1
        totalPrice:
          type: number
          description: Total line-item value in the specified currency (qty × unit price).
          minimum: 0
        FOB:
          type: number
          description: Free On Board (FOB) value for this item in the specified currency. The cost of the good excluding international shipping and insurance.
          minimum: 0
        CIF:
          type: number
          description: Cost, Insurance, and Freight (CIF) value for this item in the specified currency. The total cost including shipping and insurance to destination.
          minimum: 0
        productUrl:
          type: string
          description: URL of the product.
    Recipient:
      type: object
      properties:
        name:
          type: string
          description: Name of the recipient.
          examples:
            - John Doe
        address:
          type: string
          description: Contact address - email, phone number, or WhatsApp number depending on channel type.
          examples:
            - john.doe@example.com
    ItemStatus:
