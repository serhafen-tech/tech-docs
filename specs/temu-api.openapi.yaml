                      hawbIdExternal: BG-2601278CGP1YS9NG
                      hawbBagId: CLMC260128175913
                      hawbMasterCode: 370-97842394
      responses:
        '200':
          description: |
            **Manifest accepted for processing**
            
            The request has passed all synchronous validation checks and the manifest has been securely stored to S3. This response indicates acceptance, not completion.
            
            The manifest and parcel details have been persisted and will be processed asynchronously. Individual parcels will be extracted from the manifest file and processed by background workers.
            
            **Response structure:**
            - `message`: High-level status message
            - `body`: Detailed information including manifest number and parcel count
            - `status`: "accepted" for successful submissions
            - `token`: The X-Trace-Id from the request headers (for tracing)
            - `statusCode`: HTTP status code (200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemuResponse'
              examples:
                success_example:
                  summary: Successful submission
                  value:
                    message: "Pre-alert accepted for processing"
                    body: "Manifest 480-00143173 received successfully. 200 parcels will be processed asynchronously."
                    status: "accepted"
                    token: "a3d6f123-4b5c-6d7e-8f9a-0b1c2d3e4f56"
                    statusCode: 200
        '400':
          description: |
            **Validation failed**
            
            The request failed one or more validation checks:
            - Schema validation: Invalid data types, formats, or constraints
            - Business rules: Missing required fields, invalid array sizes, country code mismatch
            - Structure validation: Malformed header or detail arrays
            
            **Response structure:**
            - `message`: Error category
            - `body`: Detailed error description
            - `status`: "rejected" for failed validations
            - `token`: The X-Trace-Id from the request headers (for tracing)
            - `statusCode`: HTTP status code (400)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemuErrorResponse'
              examples:
                validation_error:
                  summary: Validation failed
                  value:
                    message: "Pre-alert validation failed"
                    body: "Error: Validation failed"
                    status: "rejected"
                    token: "a3d6f123-4b5c-6d7e-8f9a-0b1c2d3e4f56"
                    statusCode: 400
        '401':
          description: |
            **Unauthorized - Authentication required**
            
            This error occurs when:
            - No `Authorization` header is provided
            - Invalid or expired authentication token
            - Token verification fails
            
            The response uses the standard error format from the global exception filter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                unauthorized:
                  summary: Missing or invalid authentication
                  value:
                    success: false
                    error:
                      code: "UnauthorizedException"
                      message: "Internal server error"
                      details: []
                    timestamp: "2026-03-05T20:02:48.697Z"
                    path: "/temu/cl"
                    method: "POST"
        '404':
          description: |
            **Not Found - Invalid endpoint**
            
            This error occurs when:
            - Using an incorrect endpoint path
            - The requested resource does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                not_found:
                  summary: Invalid endpoint path
                  value:
                    success: false
                    error:
                      code: "NotFoundException"
                      message: "Internal server error"
                      details: []
                    timestamp: "2026-03-05T19:57:15.337Z"
                    path: "/temu/chile"
                    method: "POST"
        '500':
          description: |
            **Internal server error**
            
            Unexpected server-side errors including:
            - Database connection failures
            - S3 storage errors
            - Unhandled exceptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardErrorResponse'
              examples:
                internal_error:
                  summary: Unexpected server error
                  value:
                    success: false
                    error:
                      code: "InternalServerErrorException"
                      message: "Internal server error"
                      details: []
                    timestamp: "2026-03-05T19:51:24.700Z"
                    path: "/temu/cl"
                    method: "POST"
