                          hsCode: 95030099
                          qty: 1
                          currency: USD
                          productUrl: https://www.temu.com/goods.html?_bg_fs=1&goods_id=601105703311652
                          FOB: "1.41"
                      hawbTrackingId: 3514076038
                      hawbShipperName: ZQ01
                      hawbShipperCity: Zhaoqing
                      hawbShipperCountry: CN
                      hawbPieces: 5
                      hawbAddresseeName: karolaine Alvarado Moreno
                      hawbAddresseeAddress: Calle Ángel Pimentel 01487
